# Quality gates: typecheck, lint, tests, build.
# Runs on every push and every pull_request.
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build can run without real secrets; serverEnv allows empty in non-production
          NODE_ENV: production
          STRIPE_SECRET_KEY: ${{ secrets.CI_STRIPE_SK || 'sk_test_ci_placeholder' }}
          NEXT_PUBLIC_SITE_URL: https://techplay.example.com
